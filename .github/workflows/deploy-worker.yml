name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'backend-v2/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend-v2
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: backend-v2
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload secrets
        working-directory: backend-v2
        run: |
          echo "${{ secrets.DATABASE_URL }}"       | npx wrangler secret put DATABASE_URL
          echo "${{ secrets.JWT_SECRET }}"          | npx wrangler secret put JWT_SECRET
          echo "${{ secrets.RESEND_API_KEY }}"      | npx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.R2_ACCOUNT_ID }}"       | npx wrangler secret put R2_ACCOUNT_ID
          echo "${{ secrets.R2_ACCESS_KEY_ID }}"    | npx wrangler secret put R2_ACCESS_KEY_ID
          echo "${{ secrets.R2_SECRET_ACCESS_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY
          echo "${{ secrets.FRONTEND_URL }}"        | npx wrangler secret put FRONTEND_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
